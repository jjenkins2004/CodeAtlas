<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeAtlas Local UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <h1>CodeAtlas Local UI</h1>
        <p>Basic control panel for repositories, symbols, provider config, and search.</p>
        <div class="row">
          <button id="healthBtn" type="button">Check Health</button>
          <span id="healthText" class="muted">not checked</span>
        </div>
      </header>

      <section class="card">
        <h2>Providers</h2>
        <form id="ollamaForm" class="grid">
          <h3>Configure Ollama</h3>
          <label>Model <input name="model" required value="llama3.1" /></label>
          <label>Embedding Model <input name="embeddingModel" placeholder="optional" /></label>
          <label>Base URL <input name="baseUrl" type="url" required value="http://localhost:11434" /></label>
          <button type="submit">Save Ollama</button>
        </form>

        <form id="openaiForm" class="grid">
          <h3>Configure OpenAI-Compatible</h3>
          <label>Model <input name="model" required value="gpt-4o-mini" /></label>
          <label>Embedding Model <input name="embeddingModel" placeholder="optional" /></label>
          <label>API Key <input name="apiKey" required type="password" /></label>
          <button type="submit">Save OpenAI</button>
        </form>
      </section>

      <section class="card">
        <h2>Repositories</h2>
        <form id="repoForm" class="grid">
          <label>Name <input name="name" required /></label>
          <label>Path <input id="repoPath" name="path" required /></label>
          <div class="row">
            <button id="chooseFolderBtn" type="button">Choose Folder</button>
            <button type="submit">Track Repository</button>
            <button id="refreshReposBtn" type="button">Refresh List</button>
          </div>
        </form>
        <div id="reposList" class="list"></div>
      </section>

      <section class="card">
        <h2>Symbols</h2>
        <form id="symbolsListForm" class="grid">
          <label>Repository ID (optional) <input name="repositoryId" /></label>
          <label>Limit <input name="limit" type="number" min="1" max="500" value="50" /></label>
          <button type="submit">Load Symbols</button>
        </form>

        <form id="symbolGetForm" class="grid">
          <label>Get Symbol by ID <input name="id" required /></label>
          <button type="submit">Fetch Symbol</button>
        </form>

        <form id="symbolDeleteForm" class="grid">
          <label>Delete Symbol by ID <input name="id" required /></label>
          <button type="submit">Delete Symbol</button>
        </form>

        <form id="upsertForm" class="grid">
          <h3>Upsert Symbol</h3>
          <label>Repository ID <input name="repositoryId" required /></label>
          <label>Symbol <input name="symbol" required /></label>
          <label>File Path <input name="file" required /></label>
          <label>Type
            <select name="type">
              <option value="function">function</option>
              <option value="class">class</option>
              <option value="enum">enum</option>
              <option value="protocol">protocol</option>
              <option value="method">method</option>
            </select>
          </label>
          <label>Visibility
            <select name="visibility">
              <option value="public">public</option>
              <option value="internal">internal</option>
              <option value="private">private</option>
            </select>
          </label>
          <label>Blurb <textarea name="blurb" rows="2" placeholder="optional"></textarea></label>
          <label>Implementation <textarea name="implementation" rows="3" placeholder="optional"></textarea></label>
          <label>Tags (comma separated) <input name="tags" placeholder="date parsing, query ranking" /></label>
          <button type="submit">Upsert Symbol</button>
        </form>

        <div id="symbolsList" class="list"></div>
      </section>

      <section class="card">
        <h2>Search</h2>
        <form id="searchForm" class="grid">
          <label>Query <input name="q" required /></label>
          <label>Repository ID (optional) <input name="repositoryId" /></label>
          <label>Limit <input name="limit" type="number" min="1" max="50" value="10" /></label>
          <button type="submit">Run Search</button>
        </form>
        <div id="searchResults" class="list"></div>
      </section>

      <section class="card">
        <h2>Response Log</h2>
        <pre id="output"></pre>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
